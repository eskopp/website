name: Build & Deploy Hugo Site to asuna

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: erik-skopp-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build Hugo and deploy to asuna
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Go (for Hugo Modules)
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Cache Hugo modules & resources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/hugo
            ~/go/pkg/mod
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Set up Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo site
        run: |
          hugo mod get
          hugo mod tidy
          hugo --gc --minify --enableGitInfo

      - name: Verify homepage exists
        run: |
          test -f public/index.html || {
            echo "ERROR: public/index.html fehlt"
            echo
            echo "Inhalt von public/:"
            find public -maxdepth 2 | sort
            exit 1
          }

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to asuna
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            public/ \
            deploy@152.53.248.112:/var/www/erik-skopp.de/